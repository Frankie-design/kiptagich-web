<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiptagich Web GIS Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .sidebar { height: 100vh; overflow-y: auto; padding: 20px; background: white; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .map-container { height: 100vh; width: 100%; }
    </style>
</head>
<body>

<div class="container-fluid m-0 p-0">
    <div class="row g-0">
        <div class="col-md-4 sidebar">
            <h3 class="fw-bold text-success mb-1">Kiptagich Agri-GIS</h3>
            <p class="text-muted small mb-4">Adaptive Crowdsourcing & Satellite Monitoring Engine</p>
            
            {% if success_msg %}
            <div class="alert alert-success small py-2">{{ success_msg }}</div>
            {% endif %}

            <div class="card border-0 bg-light p-3 mb-4">
                <h6 class="fw-bold mb-2">➕ Register New Farm Boundary</h6>
                <form action="/add_farm" method="POST">
                    <div class="mb-2">
                        <label class="small fw-semibold text-secondary">Farmer Name</label>
                        <input type="text" name="farmer_name" class="form-control form-control-sm" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-semibold text-secondary">Phone Number</label>
                        <input type="text" name="phone_number" class="form-control form-control-sm" placeholder="e.g. +2547..." required>
                    </div>
                    <div class="mb-2">
                        <label class="small fw-semibold text-secondary">Crop Type</label>
                        <select name="crop_type" class="form-select form-select-sm" required>
                            <option value="" disabled selected>Select Crop Type</option>
                            <option value="Tea">Tea</option>
                            <option value="Maize">Maize</option>
                            <option value="Potatoes">Potatoes</option>
                            <option value="Cabbage">Cabbage</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-semibold text-secondary">Geom Polygon (WKT format)</label>
                        <textarea name="geom_polygon" class="form-control form-control-sm" rows="3" placeholder="POLYGON((35.5 -0.5, ...))" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100 fw-bold">Inject Spatial Plot</button>
                </form>
            </div>

            <div class="card border-0 bg-dark text-white p-3 mb-3">
                <div class="row text-center">
                    <div class="col-6">
                        <small class="text-muted d-block">Active Plots</small>
                        <span class="fs-4 fw-bold text-success">{{ total_farms }}</span>
                    </div>
                    <div class="col-6">
                        <small class="text-muted d-block">System Status</small>
                        <span class="fs-5 fw-bold text-info">Live Sync</span>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-5">
                <small class="text-muted style='font-size: 11px;'">Kiptagich Ward Geospatial Automated Irrigation Network</small>
            </div>
        </div>

        <div class="col-md-8">
            <div class="map-container">
                {{ map_html|safe }}
            </div>
        </div>
    </div>
</div>

</body>
</html>
