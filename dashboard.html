<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiptagich Irrigation Dashboard</title>
    <style>
        /* This section controls the colors and layout */
        body { margin: 0; display: flex; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; background-color: #f4f7f6; }
        
        #sidebar { 
            width: 350px; 
            background: #2c3e50; /* Dark Blue-Grey Professional Color */
            color: white; 
            padding: 25px; 
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        #map-container { flex-grow: 1; position: relative; }

        h2 { color: #2ecc71; margin-bottom: 5px; font-size: 1.5em; } /* JKUAT Green */
        h4 { color: #bdc3c7; margin-top: 0; font-weight: 400; border-bottom: 1px solid #3e4f5f; padding-bottom: 10px; }
        
        .section-title { font-size: 0.9em; text-transform: uppercase; color: #7f8c8d; margin-top: 25px; margin-bottom: 10px; font-weight: bold; }
        
        .status-card { background: #34495e; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        
        .legend-item { display: flex; align-items: center; margin: 8px 0; font-size: 0.95em; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 12px; }
        
        .metric { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9em; }
        .metric-val { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Kiptagich Ward</h2>
    <h4>GNSS-R Irrigation System</h4>
    
    <div class="section-title">Irrigation Status</div>
    <div class="status-card">
        <div class="legend-item"><span class="dot" style="background: #27ae60;"></span> Satisfactory</div>
        <div class="legend-item"><span class="dot" style="background: #f1c40f;"></span> Monitor</div>
        <div class="legend-item"><span class="dot" style="background: #e74c3c;"></span> Critical (Irrigate)</div>
    </div>

    <div class="section-title">System Metrics</div>
    <div class="status-card">
        <div class="metric"><span>Data Source:</span> <span class="metric-val">CYGNSS / Sentinel-2</span></div>
        <div class="metric"><span>Last Update:</span> <span class="metric-val">11-May-2026</span></div>
        <div class="metric"><span>Network:</span> <span class="metric-val" style="color: #e67e22;">Offline Mode</span></div>
    </div>

    <div class="section-title">Project Team</div>
    <div style="font-size: 0.85em; color: #bdc3c7; line-height: 1.6;">
        Karen Charity<br>
        Samantha Cherop<br>
        Franky Brian
    </div>
</div>

<div id="map-container">
    {{ map_html|safe }}
</div>

</body>
</html>
